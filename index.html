<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>per Beatrice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Dancing+Script:wght@600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red:   #c0182e;
    --pink:  #e8527a;
    --light: #f9a8c0;
    --dark:  #0a0008;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'Playfair Display', Georgia, serif;
  }

  /* ── canvas layers ── */
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #c-stars   { z-index: 1; }
  #c-heart   { z-index: 2; }
  #c-petals  { z-index: 3; }

  /* ── overlay UI ── */
  #ui {
    position: fixed; inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    gap: 0;
  }

  /* phrase that types inside the heart */
  #phrase {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1rem, 4vw, 1.55rem);
    color: #fff;
    text-shadow: 0 0 12px rgba(255,80,120,.9), 0 0 30px rgba(200,0,50,.5);
    letter-spacing: .05em;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .7s ease, transform .7s ease;
    text-align: center;
    padding: 0 12vw;
    /* vertically position it over the heart center */
    position: absolute;
    top: 50%;
    transform: translateY(calc(-50% + 2vh));
  }
  #phrase.show {
    opacity: 1;
    transform: translateY(calc(-50% + 2vh));
  }

  /* finale */
  #finale {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    transition: opacity 1.8s ease;
  }
  #finale.show { opacity: 1; }

  #f-name {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2.8rem, 9vw, 6.5rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: .12em;
    line-height: 1;
    text-shadow:
      0 0 8px  #fff,
      0 0 24px #ffb0c8,
      0 0 55px #e8527a,
      0 0 110px #c0182e66;
    animation: nameBreath 3.5s ease-in-out infinite;
  }
  @keyframes nameBreath {
    0%,100% { text-shadow: 0 0 8px #fff, 0 0 24px #ffb0c8, 0 0 55px #e8527a, 0 0 110px #c0182e66; }
    50%     { text-shadow: 0 0 14px #fff, 0 0 40px #ffd0e0, 0 0 80px #e8527a, 0 0 160px #c0182e88; }
  }

  #f-from {
    margin-top: 1.1rem;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.1rem, 3.5vw, 1.9rem);
    color: rgba(255, 190, 210, .85);
    letter-spacing: .18em;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 1.2s ease 1.1s, transform 1.2s ease 1.1s;
  }
  #finale.show #f-from {
    opacity: 1;
    transform: translateY(0);
  }

  /* tap hint */
  #hint {
    position: fixed;
    bottom: 7vh;
    width: 100%;
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-size: .9rem;
    color: rgba(255,160,185,.45);
    letter-spacing: .12em;
    z-index: 20;
    animation: hintPulse 2.6s ease-in-out infinite;
    transition: opacity .8s ease;
  }
  @keyframes hintPulse {
    0%,100% { opacity: .35; }
    50%      { opacity: .7; }
  }
  #hint.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<canvas id="c-stars"></canvas>
<canvas id="c-heart"></canvas>
<canvas id="c-petals"></canvas>

<div id="ui">
  <div id="phrase"></div>
  <div id="finale">
    <div id="f-name">Beatrice</div>
    <div id="f-from">da Andrea, con tutto il cuore ❤</div>
  </div>
</div>

<div id="hint">tocca per iniziare</div>

<script>
/* ─────────────────────────────────────────────────────────
   UTILS
───────────────────────────────────────────────────────── */
const PI  = Math.PI;
const TAU = PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const rand  = (lo, hi)    => lo + Math.random() * (hi - lo);
const easeOut3 = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;

function resize(c) {
  c.width  = window.innerWidth  * devicePixelRatio;
  c.height = window.innerHeight * devicePixelRatio;
  c.style.width  = window.innerWidth  + 'px';
  c.style.height = window.innerHeight + 'px';
}

const csStars  = document.getElementById('c-stars');
const csHeart  = document.getElementById('c-heart');
const csPetals = document.getElementById('c-petals');
const ctxS = csStars.getContext('2d');
const ctxH = csHeart.getContext('2d');
const ctxP = csPetals.getContext('2d');

[csStars, csHeart, csPetals].forEach(resize);
window.addEventListener('resize', () => [csStars, csHeart, csPetals].forEach(resize));

let W, H, CX, CY;
function recalc() {
  W  = csHeart.width;
  H  = csHeart.height;
  CX = W / 2;
  CY = H / 2;
}
recalc();
window.addEventListener('resize', recalc);

/* ─────────────────────────────────────────────────────────
   HEART MATH
───────────────────────────────────────────────────────── */
function hx(t) { return 16 * Math.pow(Math.sin(t), 3); }
function hy(t) { return -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)); }

function inHeart(nx, ny) {
  /* normalised coords where heart fits in ~[-16,16] x [-13,13] */
  const v = Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * Math.pow(ny, 3);
  return v <= 0;
}

function toHeart(px, py, cx, cy, sc) {
  return inHeart((px - cx) / (sc * 8), -(py - cy) / (sc * 8));
}

/* ─────────────────────────────────────────────────────────
   STARS
───────────────────────────────────────────────────────── */
const stars = Array.from({ length: 280 }, () => ({
  x:     rand(0, 1),
  y:     rand(0, 1),
  r:     rand(.3, 1.4),
  speed: rand(.0015, .007),
  phase: rand(0, TAU),
  col:   `hsl(${rand(300,360)},${rand(20,60)}%,${rand(75,100)}%)`
}));

function drawStars(t) {
  ctxS.clearRect(0, 0, W, H);
  stars.forEach(s => {
    const a = .18 + .62 * Math.sin(t * s.speed * 8 + s.phase);
    ctxS.beginPath();
    ctxS.arc(s.x * W, s.y * H, s.r * devicePixelRatio, 0, TAU);
    ctxS.fillStyle = s.col.replace(')', `,${a})`).replace('hsl', 'hsla');
    ctxS.fill();
  });
}

/* ─────────────────────────────────────────────────────────
   GATHERING PARTICLES → heart
───────────────────────────────────────────────────────── */
const N_GATHER = 340;
let heartScale; // set in buildGather

function buildGather() {
  heartScale = Math.min(W, H) * .032;
  const pts = Array.from({ length: N_GATHER }, (_, i) => {
    const t  = (i / N_GATHER) * TAU;
    return {
      tx: CX + hx(t) * heartScale,
      ty: CY + hy(t) * heartScale,
    };
  });
  return pts.map(p => ({
    ...p,
    x:     rand(0, W),
    y:     rand(0, H),
    r:     rand(.8, 2.4),
    hue:   rand(328, 358),
    lit:   rand(55, 82),
    phase: rand(0, TAU),
    speed: rand(.014, .026),  /* individual convergence speed */
  }));
}

let gParts = [];

/* ─────────────────────────────────────────────────────────
   MAIN HEART DRAW
───────────────────────────────────────────────────────── */
let heartVisible   = false;
let heartAlpha     = 0;
let heartBeat      = 0; // radians, drives pulse
let heartGlowExtra = 0; // 0→1 on finale

function heartPath(ctx, cx, cy, sc) {
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const t = (i / 200) * TAU;
    const x = cx + hx(t) * sc;
    const y = cy + hy(t) * sc;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawHeart(t) {
  ctxH.clearRect(0, 0, W, H);
  if (!heartVisible && heartAlpha <= 0) return;

  const sc = heartScale * (1 + .028 * Math.sin(heartBeat));

  /* ── outer glow rings ── */
  const glowR = sc * 10;
  const baseGlow = .22 + heartGlowExtra * .35;
  const glowColors = [
    [0,   `rgba(192,24,46,${baseGlow * .4})`],
    [.5,  `rgba(232,82,122,${baseGlow * .22})`],
    [1,   `rgba(10,0,8,0)`],
  ];
  const gr0 = ctxH.createRadialGradient(CX, CY - sc, 0, CX, CY - sc, glowR * 1.6);
  glowColors.forEach(([s, c]) => gr0.addColorStop(s, c));
  ctxH.save();
  ctxH.globalAlpha = heartAlpha;
  ctxH.fillStyle = gr0;
  ctxH.fillRect(CX - glowR*2, CY - glowR*2, glowR*4, glowR*4);

  /* ── main heart fill ── */
  heartPath(ctxH, CX, CY, sc);

  const grFill = ctxH.createRadialGradient(CX, CY - sc*2, 0, CX, CY, sc*11);
  grFill.addColorStop(0,   '#ff7799');
  grFill.addColorStop(.38, '#e02048');
  grFill.addColorStop(.72, '#b01030');
  grFill.addColorStop(1,   '#780020');
  ctxH.fillStyle = grFill;
  ctxH.shadowColor = '#e8527a';
  ctxH.shadowBlur  = 28 * devicePixelRatio * (1 + heartGlowExtra);
  ctxH.fill();
  ctxH.shadowBlur = 0;

  /* ── specular shine ── */
  heartPath(ctxH, CX, CY, sc);
  const grShine = ctxH.createRadialGradient(
    CX - sc * 2.5, CY - sc * 4.5, 0,
    CX - sc * 2.5, CY - sc * 4.5, sc * 6
  );
  grShine.addColorStop(0,   'rgba(255,255,255,.32)');
  grShine.addColorStop(.45, 'rgba(255,255,255,.08)');
  grShine.addColorStop(1,   'rgba(255,255,255,0)');
  ctxH.fillStyle = grShine;
  ctxH.fill();

  /* ── rim light ── */
  heartPath(ctxH, CX, CY, sc);
  ctxH.strokeStyle = 'rgba(255,140,170,.18)';
  ctxH.lineWidth   = 1.5 * devicePixelRatio;
  ctxH.stroke();

  ctxH.restore();
}

/* ─────────────────────────────────────────────────────────
   PETALS / SNOW
───────────────────────────────────────────────────────── */
const PETALS = Array.from({ length: 44 }, (_, i) => ({
  x:     rand(0, W),
  y:     rand(-H, H),
  sz:    rand(5, 16) * devicePixelRatio,
  spd:   rand(.6, 2.2),
  drift: rand(-.5, .5),
  rot:   rand(0, TAU),
  rotS:  rand(-.02, .02),
  alpha: rand(.3, .75),
  hue:   rand(328, 356),
  type:  i < 28 ? 'heart' : 'dot',
}));

const SNOW = Array.from({ length: 90 }, () => ({
  x:     rand(0, W),
  y:     rand(0, H),
  r:     rand(.5, 2.2) * devicePixelRatio,
  spd:   rand(.3, 1.1),
  drift: rand(-.3, .3),
  alpha: rand(.15, .55),
  hue:   rand(315, 355),
}));

function miniHeart(ctx, cx, cy, sz) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  for (let i = 0; i <= 60; i++) {
    const t = (i / 60) * TAU;
    const x = hx(t) * sz;
    const y = hy(t) * sz;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.restore();
}

function drawPetals() {
  ctxP.clearRect(0, 0, W, H);

  SNOW.forEach(s => {
    s.y += s.spd; s.x += s.drift;
    if (s.y > H + 4) { s.y = -4; s.x = rand(0, W); }
    ctxP.beginPath();
    ctxP.arc(s.x, s.y, s.r, 0, TAU);
    ctxP.fillStyle = `hsla(${s.hue},100%,82%,${s.alpha})`;
    ctxP.shadowColor = `hsl(${s.hue},100%,72%)`;
    ctxP.shadowBlur  = 4 * devicePixelRatio;
    ctxP.fill();
    ctxP.shadowBlur = 0;
  });

  PETALS.forEach(p => {
    p.y   += p.spd;
    p.x   += p.drift;
    p.rot += p.rotS;
    if (p.y > H + 30) { p.y = -30; p.x = rand(0, W); }

    ctxP.save();
    ctxP.translate(p.x, p.y);
    ctxP.rotate(p.rot);
    ctxP.globalAlpha = p.alpha;

    if (p.type === 'heart') {
      miniHeart(ctxP, 0, 0, p.sz / 17);
      ctxP.fillStyle   = `hsl(${p.hue},100%,58%)`;
      ctxP.shadowColor = `hsl(${p.hue},100%,55%)`;
      ctxP.shadowBlur  = 10 * devicePixelRatio;
      ctxP.fill();
    } else {
      ctxP.beginPath();
      ctxP.arc(0, 0, p.sz * .5, 0, TAU);
      ctxP.fillStyle = `hsla(${p.hue},100%,80%,.6)`;
      ctxP.fill();
    }
    ctxP.restore();
  });
}

/* ─────────────────────────────────────────────────────────
   PHRASE SEQUENCER (typewriter feel, not perfect)
───────────────────────────────────────────────────────── */
const phrases = [
  '❤ Ti amo, Beatrice',
  '❤ I love you, Beatrice',
  '❤ Je t\'aime, Beatrice',
  '❤ Я люблю тебя, Беатриче',
  '❤ Te iubesc, Beatrice',
  '❤ Të dua, Beatrice',
];

const phraseEl = document.getElementById('phrase');
const finaleEl = document.getElementById('finale');
let phraseIdx  = 0;
let finaleShown = false;

function showPhrase(i) {
  if (i >= phrases.length) {
    phraseEl.classList.remove('show');
    setTimeout(() => {
      phraseEl.style.display = 'none';
      finaleEl.classList.add('show');
      finaleShown = true;
      // boost heart glow
      const glowStart = performance.now();
      (function animGlow(ts) {
        const t = (ts - glowStart) / 1400;
        heartGlowExtra = clamp(easeInOut(t), 0, 1);
        if (t < 1) requestAnimationFrame(animGlow);
      })(performance.now());
    }, 800);
    return;
  }

  phraseEl.classList.remove('show');
  phraseEl.textContent = '';

  setTimeout(() => {
    /* slight imperfection: random tiny delay per char */
    const text = phrases[i];
    let j = 0;
    phraseEl.classList.add('show');
    function typeChar() {
      if (j <= text.length) {
        phraseEl.textContent = text.slice(0, j);
        j++;
        setTimeout(typeChar, rand(28, 68));
      } else {
        setTimeout(() => showPhrase(i + 1), 2600 + rand(0, 400));
      }
    }
    typeChar();
  }, 640);
}

/* ─────────────────────────────────────────────────────────
   MAIN LOOP
───────────────────────────────────────────────────────── */
let started    = false;
let startTime  = null;
let gatherDone = false;
let gathT      = 0;

function loop(ts) {
  if (!startTime) startTime = ts;
  const t = (ts - startTime) * .001;

  drawStars(t);
  drawPetals();

  heartBeat = t * 1.92;

  if (!started) {
    ctxH.clearRect(0, 0, W, H);
    requestAnimationFrame(loop);
    return;
  }

  if (!gatherDone) {
    /* gather phase */
    gathT = clamp(gathT + .005, 0, 1);
    const ease = easeOut3(gathT);

    ctxH.clearRect(0, 0, W, H);
    gParts.forEach(p => {
      const cx = lerp(p.x, p.tx, ease);
      const cy = lerp(p.y, p.ty, ease);
      const fl = .5 + .5 * Math.sin(ts * .003 + p.phase);
      ctxH.beginPath();
      ctxH.arc(cx, cy, p.r * devicePixelRatio * fl, 0, TAU);
      ctxH.fillStyle   = `hsla(${p.hue},100%,${p.lit}%,${fl})`;
      ctxH.shadowColor = `hsl(${p.hue},100%,68%)`;
      ctxH.shadowBlur  = 7 * devicePixelRatio;
      ctxH.fill();
      ctxH.shadowBlur = 0;
    });

    if (gathT >= 1) {
      gatherDone   = true;
      heartVisible = true;
      const fadeStart = ts;
      (function fadeIn(now) {
        heartAlpha = clamp((now - fadeStart) / 900, 0, 1);
        if (heartAlpha < 1) requestAnimationFrame(fadeIn);
        else setTimeout(() => showPhrase(0), 300);
      })(ts);
    }
  } else {
    drawHeart(t);
  }

  requestAnimationFrame(loop);
}

/* ─────────────────────────────────────────────────────────
   START ON TAP / CLICK
───────────────────────────────────────────────────────── */
const hint = document.getElementById('hint');

function begin() {
  if (started) return;
  started = true;
  hint.classList.add('hide');
  gParts = buildGather();
}

document.addEventListener('click',      begin);
document.addEventListener('touchstart', begin, { passive: true });

/* kick off render */
requestAnimationFrame(loop);
</script>
</body>
</html>
